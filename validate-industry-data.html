<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industry Data Validator</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .result { padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .warning { background: #fff3cd; border: 1px solid #ffeaa7; color: #856404; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: white; padding: 15px; border-radius: 5px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Industry Data Validator</h1>
    <p>Testing data loading for industry pages</p>
    
    <button onclick="testData()">Test Data Loading</button>
    <button onclick="testAllIndustries()">Test All Industries</button>
    <button onclick="testAnswerFormat()">Test Answer Format</button>
    
    <div id="results"></div>
    
    <script src="questions.js"></script>
    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            results.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function testData() {
            log('Starting data validation test...', 'warning');
            
            // Test 1: Check if questionBank exists
            if (typeof window.questionBank === 'undefined') {
                log('❌ questionBank is undefined. questions.js may not be loaded.', 'error');
                return;
            }
            
            const qb = window.questionBank;
            log(`✅ questionBank loaded. Type: ${typeof qb}, Length: ${Array.isArray(qb) ? qb.length : 'N/A'}`, 'success');
            
            if (!Array.isArray(qb)) {
                log('❌ questionBank is not an array', 'error');
                return;
            }
            
            if (qb.length === 0) {
                log('❌ questionBank is empty', 'error');
                return;
            }
            
            // Test 2: Check sample question structure
            const sample = qb[0];
            log(`Sample question: ID=${sample.id}, Role=${sample.role}, Title="${sample.title?.substring(0, 30)}..."`, 'info');
            
            // Test 3: Check required fields
            const requiredFields = ['id', 'role', 'title', 'question'];
            const missingFields = requiredFields.filter(field => !(field in sample));
            
            if (missingFields.length > 0) {
                log(`❌ Sample question missing fields: ${missingFields.join(', ')}`, 'error');
            } else {
                log(`✅ All required fields present`, 'success');
            }
            
            // Test 4: Check answer format
            const answerFormats = [];
            if (sample.answers?.concise?.answer) answerFormats.push('answers.concise.answer');
            if (sample.answers?.detailed?.answer) answerFormats.push('answers.detailed.answer');
            if (sample.conciseAnswer) answerFormats.push('conciseAnswer');
            if (sample.modelAnswer) answerFormats.push('modelAnswer');
            if (sample.answer) answerFormats.push('answer');
            
            if (answerFormats.length === 0) {
                log('❌ No answer format found in sample question', 'error');
            } else {
                log(`✅ Answer formats available: ${answerFormats.join(', ')}`, 'success');
            }
            
            // Test 5: Industry distribution
            const industryCount = {};
            qb.forEach(q => {
                const role = q.role || 'unknown';
                industryCount[role] = (industryCount[role] || 0) + 1;
            });
            
            log('Industry distribution:', 'info');
            Object.keys(industryCount).forEach(role => {
                log(`  ${role}: ${industryCount[role]} questions`, 'info');
            });
            
            log('Data validation complete!', 'success');
        }
        
        function testAllIndustries() {
            log('Testing all industries...', 'warning');
            
            if (typeof window.questionBank === 'undefined') {
                log('❌ questionBank not loaded', 'error');
                return;
            }
            
            const qb = window.questionBank;
            if (!Array.isArray(qb)) {
                log('❌ questionBank not an array', 'error');
                return;
            }
            
            const industries = ['ib', 'am', 'quant', 'markets', 'corpfin', 'risk', 'fintech', 'fo'];
            const results = {};
            
            industries.forEach(industry => {
                const questions = qb.filter(q => q.role === industry);
                results[industry] = {
                    count: questions.length,
                    hasQuestions: questions.length > 0,
                    sampleTitles: questions.slice(0, 2).map(q => q.title?.substring(0, 30) + '...')
                };
            });
            
            log('Industry test results:', 'info');
            industries.forEach(industry => {
                const result = results[industry];
                if (result.hasQuestions) {
                    log(`✅ ${industry}: ${result.count} questions (${result.sampleTitles.join(', ')})`, 'success');
                } else {
                    log(`❌ ${industry}: No questions found`, 'error');
                }
            });
            
            // Summary
            const hasQuestions = industries.filter(ind => results[ind].hasQuestions);
            const noQuestions = industries.filter(ind => !results[ind].hasQuestions);
            
            log(`Summary: ${hasQuestions.length} industries have questions, ${noQuestions.length} industries have no questions`, 
                noQuestions.length > 3 ? 'error' : 'warning');
        }
        
        function testAnswerFormat() {
            log('Testing answer format compatibility...', 'warning');
            
            if (typeof window.questionBank === 'undefined') {
                log('❌ questionBank not loaded', 'error');
                return;
            }
            
            const qb = window.questionBank;
            if (!Array.isArray(qb)) {
                log('❌ questionBank not an array', 'error');
                return;
            }
            
            // Check first 10 questions
            const sampleQuestions = qb.slice(0, 10);
            const formatStats = {
                'answers.concise.answer': 0,
                'answers.detailed.answer': 0,
                'conciseAnswer': 0,
                'modelAnswer': 0,
                'answer': 0,
                'noAnswer': 0
            };
            
            sampleQuestions.forEach((q, index) => {
                if (q.answers?.concise?.answer) formatStats['answers.concise.answer']++;
                else if (q.answers?.detailed?.answer) formatStats['answers.detailed.answer']++;
                else if (q.conciseAnswer) formatStats['conciseAnswer']++;
                else if (q.modelAnswer) formatStats['modelAnswer']++;
                else if (q.answer) formatStats['answer']++;
                else formatStats['noAnswer']++;
            });
            
            log('Answer format distribution (first 10 questions):', 'info');
            Object.keys(formatStats).forEach(format => {
                const count = formatStats[format];
                if (count > 0) {
                    log(`  ${format}: ${count} questions`, 'info');
                }
            });
            
            // Check if industry.html can handle these formats
            const hasConcise = formatStats['answers.concise.answer'] > 0 || formatStats['conciseAnswer'] > 0;
            const hasDetailed = formatStats['answers.detailed.answer'] > 0 || formatStats['modelAnswer'] > 0;
            
            if (hasConcise) {
                log('✅ Concise answers available', 'success');
            } else {
                log('⚠️ No concise answer format found', 'warning');
            }
            
            if (hasDetailed) {
                log('✅ Detailed answers available', 'success');
            }
            
            log('Answer format test complete!', 'success');
        }
        
        // Auto-run basic test
        setTimeout(() => {
            testData();
        }, 500);
    </script>
</body>
</html>
