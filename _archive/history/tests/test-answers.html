<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finterview - 答案显示测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .test-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
        }
        
        .test-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .test-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .test-card:hover {
            transform: translateY(-5px);
        }
        
        .question-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .question-text {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .answer-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #28a745;
        }
        
        .answer-title {
            font-weight: 600;
            color: #28a745;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .concise-answer {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #444;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .test-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            transition: background 0.3s;
        }
        
        .test-button:hover {
            background: #5a67d8;
        }
        
        .results {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .results h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="test-header">
            <h1>🦢 Finterview 答案显示测试</h1>
            <p>验证数据格式和答案显示功能</p>
            <p id="test-time">测试时间: <span id="current-time"></span></p>
        </div>
        
        <div class="test-grid" id="testGrid">
            <!-- 测试卡片将在这里动态生成 -->
        </div>
        
        <div class="results">
            <h3>📊 测试结果</h3>
            <div id="testResults">
                <p>正在加载测试...</p>
            </div>
            <button class="test-button" onclick="runAllTests()">🔄 重新运行所有测试</button>
        </div>
    </div>

    <!-- 加载 questions.js -->
    <script src="questions.js?v=20260313_2251"></script>
    
    <script>
        // 设置当前时间
        document.getElementById('current-time').textContent = new Date().toLocaleString();
        
        // 测试函数
        function runAllTests() {
            const testResults = document.getElementById('testResults');
            testResults.innerHTML = '<p>正在运行测试...</p>';
            
            // 检查 questionBank 是否存在
            if (typeof questionBank === 'undefined') {
                testResults.innerHTML = '<div class="status-error status-badge">❌ 错误: questionBank 未定义</div>';
                return;
            }
            
            let successCount = 0;
            let errorCount = 0;
            let resultsHtml = '<div class="status-success status-badge">✅ 找到 ' + questionBank.length + ' 个题目</div>';
            
            // 测试前5个题目
            const testQuestions = questionBank.slice(0, 5);
            
            // 清空并重新填充测试网格
            const testGrid = document.getElementById('testGrid');
            testGrid.innerHTML = '';
            
            testQuestions.forEach((question, index) => {
                // 创建测试卡片
                const card = document.createElement('div');
                card.className = 'test-card';
                
                let hasAnswers = 'answers' in question;
                let hasConcise = question.answers?.concise?.answer ? true : false;
                let conciseContent = question.answers?.concise?.answer || '无简洁答案';
                let conciseType = typeof conciseContent;
                
                // 状态徽章
                const statusClass = hasAnswers && hasConcise ? 'status-success' : 'status-error';
                const statusText = hasAnswers && hasConcise ? '✅ 正常' : '❌ 问题';
                
                card.innerHTML = `
                    <div class="status-badge ${statusClass}">${statusText}</div>
                    <div class="question-title">${index + 1}. ${question.title || '无标题'}</div>
                    <div class="question-text">${question.text || question.question || '无问题文本'}</div>
                    <div class="answer-section">
                        <div class="answer-title">简洁答案 (${conciseType}):</div>
                        <div class="concise-answer">${escapeHtml(conciseContent)}</div>
                    </div>
                    <div style="margin-top: 10px; font-size: 0.9rem; color: #666;">
                        <strong>数据结构:</strong> 
                        有answers字段: ${hasAnswers ? '✅' : '❌'} | 
                        有concise答案: ${hasConcise ? '✅' : '❌'} |
                        答案类型: ${conciseType}
                    </div>
                `;
                
                testGrid.appendChild(card);
                
                // 更新统计
                if (hasAnswers && hasConcise) {
                    successCount++;
                } else {
                    errorCount++;
                }
            });
            
            // 显示总体结果
            resultsHtml += `
                <div style="margin-top: 15px;">
                    <p><strong>📈 测试统计:</strong></p>
                    <p>✅ 正常题目: ${successCount}</p>
                    <p>❌ 问题题目: ${errorCount}</p>
                    <p>📊 成功率: ${((successCount / testQuestions.length) * 100).toFixed(1)}%</p>
                </div>
            `;
            
            // 显示第一个题目的完整数据结构（用于调试）
            if (questionBank.length > 0) {
                resultsHtml += `
                    <div style="margin-top: 20px;">
                        <p><strong>🔍 第一个题目数据结构:</strong></p>
                        <pre>${JSON.stringify({
                            hasAnswers: 'answers' in questionBank[0],
                            answersKeys: questionBank[0].answers ? Object.keys(questionBank[0].answers) : '无',
                            conciseExists: !!questionBank[0].answers?.concise,
                            conciseType: typeof questionBank[0].answers?.concise?.answer,
                            concisePreview: questionBank[0].answers?.concise?.answer ? 
                                questionBank[0].answers.concise.answer.substring(0, 100) + '...' : '无'
                        }, null, 2)}</pre>
                    </div>
                `;
            }
            
            testResults.innerHTML = resultsHtml;
        }
        
        // HTML转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 页面加载时自动运行测试
        window.addEventListener('DOMContentLoaded', () => {
            // 给 questions.js 一点时间加载
            setTimeout(runAllTests, 500);
        });
    </script>
</body>
</html>
