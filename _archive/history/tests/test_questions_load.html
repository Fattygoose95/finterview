<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Questions.js Load</title>
</head>
<body>
    <h1>Test Questions.js Load</h1>
    <div id="output"></div>
    
    <script src="questions.js?v=20260313_2251"></script>
    <script>
        // Wait a bit for questions.js to load
        setTimeout(function() {
            const output = document.getElementById('output');
            
            if (typeof questionBank !== 'undefined') {
                output.innerHTML = '<p style="color: green;">✓ questionBank loaded successfully!</p>';
                output.innerHTML += `<p>Total questions: ${questionBank.length}</p>`;
                
                // Find duration question
                const durationQuestion = questionBank.find(q => 
                    q.title && q.title.includes('Duration and interest rate risk')
                );
                
                if (durationQuestion) {
                    output.innerHTML += '<p style="color: green;">✓ Found duration question</p>';
                    output.innerHTML += `<p>Title: ${durationQuestion.title}</p>`;
                    output.innerHTML += `<p>Concise answer: ${durationQuestion.answers?.concise?.answer || 'No concise answer'}</p>`;
                    
                    // Check if answer is the new one
                    const conciseAnswer = durationQuestion.answers?.concise?.answer || '';
                    const isNewAnswer = conciseAnswer.includes('Macaulay vs. modified duration');
                    
                    output.innerHTML += `<p>Is new answer? ${isNewAnswer ? '✓ YES' : '✗ NO'}</p>`;
                } else {
                    output.innerHTML += '<p style="color: red;">✗ Could not find duration question</p>';
                }
            } else {
                output.innerHTML = '<p style="color: red;">✗ questionBank not defined</p>';
            }
        }, 500);
    </script>
</body>
</html>
