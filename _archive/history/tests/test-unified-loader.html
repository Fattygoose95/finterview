<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统一数据加载器测试 - finterview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 30px;
        }
        
        h1 {
            color: #4361ee;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }
        
        .test-section {
            margin: 25px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #4361ee;
        }
        
        .test-result {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 6px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .success {
            border-left-color: #2ecc71;
            background: #f0fff4;
        }
        
        .warning {
            border-left-color: #f39c12;
            background: #fff9e6;
        }
        
        .error {
            border-left-color: #e74c3c;
            background: #fff0f0;
        }
        
        .button {
            background: #4361ee;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
            margin-top: 10px;
        }
        
        .button:hover {
            background: #3a0ca3;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #4361ee;
            margin: 10px 0;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .question-sample {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .question-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        .question-content {
            color: #555;
            margin-bottom: 10px;
        }
        
        .question-meta {
            font-size: 0.85rem;
            color: #888;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 8px;
        }
        
        .badge-ib { background: #3498db; color: white; }
        .badge-am { background: #2ecc71; color: white; }
        .badge-quant { background: #e74c3c; color: white; }
        .badge-mock { background: #9b59b6; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 统一数据加载器测试</h1>
        
        <div class="test-section">
            <h2>1. 数据源检测测试</h2>
            <p>测试智能数据源检测功能，按优先级尝试: questions.js → questions_179.js → unified_questions.json</p>
            <button class="button" onclick="testDataSourceDetection()">开始测试</button>
            <div id="sourceTestResult" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h2>2. 数据加载测试</h2>
            <p>测试数据加载和格式转换功能</p>
            <button class="button" onclick="testDataLoading()">加载数据</button>
            <div id="dataTestResult" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h2>3. 功能API测试</h2>
            <p>测试数据加载器的API功能</p>
            <button class="button" onclick="testAPIFunctions()">测试API</button>
            <div id="apiTestResult" class="test-result"></div>
        </div>
        
        <div id="statsSection" style="display: none;">
            <h2>📈 数据统计</h2>
            <div class="stats-grid" id="statsGrid"></div>
            
            <div id="sampleSection" style="margin-top: 30px;">
                <h3>📝 题目示例</h3>
                <div id="questionSamples"></div>
            </div>
        </div>
        
        <div class="test-section">
            <h2>4. 集成测试</h2>
            <p>测试与现有页面的兼容性</p>
            <button class="button" onclick="window.location.href='high-frequency-list.html'">测试高频题页面</button>
            <button class="button" onclick="window.location.href='random-list.html'">测试随机题页面</button>
            <button class="button" onclick="window.location.href='error-check.html'">测试错误检查页面</button>
        </div>
    </div>
    
    <script src="js/unified-data-loader.js"></script>
    <script>
        let dataLoader = null;
        
        async function testDataSourceDetection() {
            const resultEl = document.getElementById('sourceTestResult');
            resultEl.innerHTML = '测试中...';
            resultEl.className = 'test-result warning';
            
            try {
                console.log('[测试] 开始数据源检测测试...');
                
                // 重置数据加载器
                if (typeof UnifiedDataLoader !== 'undefined') {
                    UnifiedDataLoader.reset();
                }
                
                // 初始化
                const result = await UnifiedDataLoader.init();
                
                resultEl.className = 'test-result ' + (result.success ? 'success' : 'warning');
                resultEl.innerHTML = JSON.stringify(result, null, 2);
                
                dataLoader = UnifiedDataLoader;
                
                console.log('[测试] 数据源检测完成:', result);
                
            } catch (error) {
                resultEl.className = 'test-result error';
                resultEl.innerHTML = '错误: ' + error.message + '\n\n堆栈: ' + error.stack;
                console.error('[测试] 数据源检测失败:', error);
            }
        }
        
        async function testDataLoading() {
            const resultEl = document.getElementById('dataTestResult');
            resultEl.innerHTML = '加载中...';
            resultEl.className = 'test-result warning';
            
            if (!dataLoader) {
                resultEl.innerHTML = '请先进行数据源检测测试';
                return;
            }
            
            try {
                console.log('[测试] 开始数据加载测试...');
                
                const allQuestions = dataLoader.getAllQuestions();
                const source = dataLoader.getCurrentSource();
                const stats = dataLoader.getStats();
                
                const result = {
                    source: source,
                    stats: stats,
                    sampleCount: allQuestions.length,
                    hasConciseAnswers: allQuestions.filter(q => q.conciseAnswer && q.conciseAnswer.length > 0).length,
                    sampleQuestion: allQuestions.length > 0 ? allQuestions[0] : null
                };
                
                resultEl.className = 'test-result success';
                resultEl.innerHTML = JSON.stringify(result, null, 2);
                
                // 显示统计信息
                displayStats(stats, allQuestions);
                
                console.log('[测试] 数据加载完成:', result);
                
            } catch (error) {
                resultEl.className = 'test-result error';
                resultEl.innerHTML = '错误: ' + error.message;
                console.error('[测试] 数据加载失败:', error);
            }
        }
        
        async function testAPIFunctions() {
            const resultEl = document.getElementById('apiTestResult');
            resultEl.innerHTML = '测试中...';
            resultEl.className = 'test-result warning';
            
            if (!dataLoader) {
                resultEl.innerHTML = '请先加载数据';
                return;
            }
            
            try {
                console.log('[测试] 开始API功能测试...');
                
                const tests = [];
                
                // 测试1: 获取行业列表
                const industries = dataLoader.getIndustries();
                tests.push({
                    name: '获取行业列表',
                    result: Object.keys(industries).length > 0 ? '成功' : '失败',
                    details: `找到 ${Object.keys(industries).length} 个行业`
                });
                
                // 测试2: 按行业筛选
                const ibQuestions = dataLoader.getQuestionsByIndustry('ib');
                tests.push({
                    name: '按行业筛选(IB)',
                    result: ibQuestions.length > 0 ? '成功' : '警告',
                    details: `找到 ${ibQuestions.length} 个IB题目`
                });
                
                // 测试3: 高频题获取
                const highFreqQuestions = dataLoader.getHighFrequencyQuestions('ib', 5);
                tests.push({
                    name: '获取高频题',
                    result: highFreqQuestions.length > 0 ? '成功' : '警告',
                    details: `获取 ${highFreqQuestions.length} 个高频题`
                });
                
                // 测试4: 随机题目获取
                const randomQuestions = dataLoader.getRandomQuestions(3);
                tests.push({
                    name: '获取随机题',
                    result: randomQuestions.length > 0 ? '成功' : '警告',
                    details: `获取 ${randomQuestions.length} 个随机题`
                });
                
                resultEl.className = 'test-result success';
                resultEl.innerHTML = tests.map(t => 
                    `✅ ${t.name}: ${t.result}\n   详情: ${t.details}`
                ).join('\n\n');
                
                console.log('[测试] API功能测试完成:', tests);
                
            } catch (error) {
                resultEl.className = 'test-result error';
                resultEl.innerHTML = '错误: ' + error.message;
                console.error('[测试] API功能测试失败:', error);
            }
        }
        
        function displayStats(stats, questions) {
            document.getElementById('statsSection').style.display = 'block';
            
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.totalQuestions}</div>
                    <div class="stat-label">总题目数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.industries}</div>
                    <div class="stat-label">行业数量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.hasConciseAnswers}</div>
                    <div class="stat-label">简洁答案</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.currentSource}</div>
                    <div class="stat-label">数据源</div>
                </div>
            `;
            
            // 显示题目示例
            const sampleSection = document.getElementById('questionSamples');
            sampleSection.innerHTML = '';
            
            // 显示前3个题目
            const sampleQuestions = questions.slice(0, 3);
            
            sampleQuestions.forEach((q, index) => {
                const roleClass = 'badge-' + (q.role || 'mock');
                const sampleDiv = document.createElement('div');
                sampleDiv.className = 'question-sample';
                sampleDiv.innerHTML = `
                    <div class="question-title">${index + 1}. ${escapeHtml(q.title || '未命名题目')}</div>
                    <div class="question-content">${escapeHtml(q.question || '')}</div>
                    <div class="question-meta">
                        <span class="badge ${roleClass}">${q.role || 'unknown'}</span>
                        <span>难度: ${q.difficulty || 'medium'}</span>
                        <span> | 频率: ${(q.frequencyScore || 0).toFixed(1)}</span>
                        ${q.conciseAnswer ? '<span> | 有简洁答案</span>' : ''}
                    </div>
                `;
                sampleSection.appendChild(sampleDiv);
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 页面加载后自动运行基本测试
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('[测试] 页面加载完成，开始基本测试...');
            
            try {
                // 初始化数据加载器
                const result = await UnifiedDataLoader.init();
                dataLoader = UnifiedDataLoader;
                
                console.log('[测试] 基本初始化完成:', result);
                
                // 自动显示统计数据
                const stats = dataLoader.getStats();
                const questions = dataLoader.getAllQuestions();
                
                if (questions.length > 0) {
                    displayStats(stats, questions);
                }
                
            } catch (error) {
                console.warn('[测试] 自动测试失败:', error);
            }
        });
    </script>
</body>
</html>
