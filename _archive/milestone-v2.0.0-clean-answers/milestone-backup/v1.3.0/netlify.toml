[build]
  publish = "."  # 发布根目录
  command = ""   # 静态网站，无需构建命令

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[plugins]]
  package = "@netlify/plugin-cache"